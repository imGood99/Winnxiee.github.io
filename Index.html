        }
        .hero-glow {

        /* Gallery grid modern dengan efek stagger & hover scale */

            max-width: 1400px;
            margin: 2rem auto 5rem;
            padding: 0 1.8rem;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
        }
        .gallery-item {
            border-radius: 32px;
            overflow: hidden;
            background: rgba(18, 18, 28, 0.55);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            opacity: 0;
            transform: translateY(35px);
            animation: cardReveal 0.7s forwards;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.4);
        }
        @keyframes cardReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }

        .gallery-item:hover {

        .img-wrapper {
            aspect-ratio: 1 / 1;
            overflow: hidden;
            position: relative;
        }

            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .gallery-item:hover .img-wrapper img {
            transform: scale(1.08);
        }
        /* overlay glitter effect on image hover */

            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            pointer-events: none;

        .gallery-item:hover .img-wrapper::after {
            transform: translateX(100%);

            .gallery-grid { gap: 1.2rem; }

    ];

    // DOM
    const galleryGrid = document.getElementById('galleryGrid');
    const modal = document.getElementById('lightboxModal');
    const modalImg = document.getElementById('modalImage');
    const modalCaption = document.getElementById('modalCaption');
    const closeModalBtn = document.querySelector('.close-modal');

    // Fungsi render semua foto dalam satu galeri tanpa filter (semua digabung, 1 kategori eksplisit)
    function renderAllPhotos() {
        let html = '';
        photos.forEach((photo, idx) => {
            // delay animasi card yang unik berdasarkan indeks
            const delay = (idx % 9) * 0.04;
            html += `
                <div class="gallery-item" data-id="${photo.id}" style="animation-delay: ${delay}s">
                    <div class="img-wrapper">
                        <img src="${photo.imgUrl}" alt="${escapeHtml(photo.title)}" loading="lazy">
                    </div>
                    <div class="card-info">
                        <h3>${escapeHtml(photo.title)}</h3>
                        <p><i class="fas fa-camera"></i> ${escapeHtml(photo.desc)}</p>
                        <div class="image-count"><i class="fas fa-infinity"></i> timeless frame</div>
                    </div>
                </div>
            `;
        });
        galleryGrid.innerHTML = html;
        
        // attach event click ke setiap item untuk membuka lightbox dengan efek
        document.querySelectorAll('.gallery-item').forEach(item => {
            item.addEventListener('click', (e) => {
                const id = parseInt(item.getAttribute('data-id'));
                const foundPhoto = photos.find(p => p.id === id);
                if (foundPhoto) {
                    openLightbox(foundPhoto.imgUrl, `${foundPhoto.title} · ${foundPhoto.desc}`);
                }
            });
        });
    }

    // fungsi escape
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Lightbox dinamis dengan animasi masuk
    function openLightbox(imgUrl, captionText) {
        modal.classList.add('show');
        modalImg.src = imgUrl;
        modalCaption.innerText = captionText;
        document.body.style.overflow = 'hidden';
    }
    
    function closeLightbox() {
        modal.classList.remove('show');
        document.body.style.overflow = '';
        // sedikit delay agar tidak flicker
        setTimeout(() => {
            if (!modal.classList.contains('show')) modalImg.src = '';
        }, 200);
    }
    
    // event modal
    closeModalBtn.addEventListener('click', closeLightbox);
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeLightbox();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('show')) closeLightbox();
    });

    // inisialisasi galeri tanpa kategori tambahan
    renderAllPhotos();
    
    // efek hover tambahan dengan mousemove pada cards (opsional, biar makin keren)
    const applyTilt = () => {
        const cards = document.querySelectorAll('.gallery-item');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const xRot = ((y - rect.height/2) / rect.height) * 6;
                const yRot = ((x - rect.width/2) / rect.width) * -6;
                card.style.transform = `perspective(1200px) translateY(-6px) rotateX(${xRot}deg) rotateY(${yRot}deg) scale(1.02)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = '';
            });
        });
    };
    // panggil setelah render, menggunakan MutationObserver sederhana atau timeout
    setTimeout(applyTilt, 100);
    // observer untuk menjaga jika nanti ada perubahan
    const observer = new MutationObserver(() => applyTilt());
    observer.observe(galleryGrid, { childList: true, subtree: true });
</script>
</body>
</html>
